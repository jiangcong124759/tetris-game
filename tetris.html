<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        canvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: #000;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 140px;
            max-height: 600px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .info-box h3 {
            font-size: 0.75em;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        .info-box .value {
            font-size: 1.4em;
            font-weight: bold;
        }
        .next-piece canvas {
            width: 80px;
            height: 60px;
        }
        .preview-queue {
            display: flex;
            flex-direction: row;
            gap: 5px;
            justify-content: center;
        }
        .preview-queue canvas {
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            width: 35px;
            height: 35px;
        }
        .controls {
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.7em;
            line-height: 1.5;
        }
        .controls h3 {
            color: #ff00ff;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 10px;
        }
        .controls span {
            color: #00d4ff;
            font-weight: bold;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .start-btn {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #ff00ff;
            text-align: center;
            display: none;
        }
        .game-over h2 {
            color: #ff00ff;
            font-size: 2em;
            margin-bottom: 15px;
        }
        .game-over.show {
            display: block;
        }

        /* 排行榜样式 */
        .leaderboard {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            max-height: 120px;
            overflow-y: auto;
        }
        .leaderboard h3 {
            font-size: 0.75em;
            color: #ffd700;
            margin-bottom: 6px;
            text-align: center;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75em;
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-rank {
            color: #ffd700;
            font-weight: bold;
            width: 25px;
        }
        .leaderboard-name {
            flex: 1;
            text-align: left;
            padding-left: 10px;
            color: #fff;
        }
        .leaderboard-score {
            color: #00d4ff;
            font-weight: bold;
        }
        .leaderboard-item.top-1 .leaderboard-rank { color: #ffd700; }
        .leaderboard-item.top-2 .leaderboard-rank { color: #c0c0c0; }
        .leaderboard-item.top-3 .leaderboard-rank { color: #cd7f32; }

        /* 输入名字对话框 */
        .name-input-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .name-input-modal.show {
            display: flex;
        }
        .name-input-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px 40px;
            border-radius: 15px;
            border: 2px solid #00d4ff;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        .name-input-box h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .name-input-box input {
            padding: 12px 20px;
            font-size: 1.2em;
            border: 2px solid rgba(0, 212, 255, 0.5);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
        }
        .name-input-box input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .name-input-box .final-score {
            color: #ffd700;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        /* 音效控制样式 */
        .sound-control {
            padding: 8px 10px;
        }
        .sound-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sound-btn {
            padding: 5px 12px;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .sound-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.4);
        }
        .sound-btn.muted {
            background: linear-gradient(90deg, #666, #444);
        }
        .volume-control {
            flex: 1;
        }
        .volume-control label {
            display: block;
            font-size: 0.7em;
            color: #00d4ff;
            margin-bottom: 2px;
        }
        .volume-control input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(0, 212, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <h1>🎮 俄罗斯方块</h1>
            <div style="position: relative;">
                <canvas id="game" width="300" height="600"></canvas>
                <div id="gameOver" class="game-over">
                    <h2>游戏结束</h2>
                    <p>最终得分: <span id="finalScore">0</span></p>
                    <button class="start-btn" onclick="game.restart()">重新开始</button>
                </div>
            </div>
            <button id="startBtn" class="start-btn" onclick="game.start()">开始游戏</button>
        </div>
        <div class="right-panel">
            <!-- 合并的游戏信息 -->
            <div class="info-box">
                <div style="display: flex; justify-content: space-between; text-align: center;">
                    <div>
                        <h3>🏆 得分</h3>
                        <div id="score" class="value">0</div>
                    </div>
                    <div>
                        <h3>等级</h3>
                        <div id="level" class="value">1</div>
                    </div>
                    <div>
                        <h3>行数</h3>
                        <div id="lines" class="value">0</div>
                    </div>
                </div>
            </div>
            
            <!-- 下一个方块预览 -->
            <div class="info-box next-piece">
                <h3>🔮 下一个</h3>
                <div class="preview-queue">
                    <canvas id="next1" width="35" height="35"></canvas>
                </div>
            </div>
            
            <!-- 音效控制 -->
            <div class="info-box sound-control">
                <div class="sound-row">
                    <button id="soundToggle" class="sound-btn" onclick="game.toggleSound()">🔊 开启</button>
                    <div class="volume-control">
                        <label>音量: <span id="volumeValue">50%</span></label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="game.setVolume(this.value)">
                    </div>
                </div>
            </div>
            
            <!-- 本地排行榜 -->
            <div class="leaderboard">
                <h3>🏅 排行榜 TOP5</h3>
                <div id="leaderboardList">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <!-- 操作说明 -->
            <div class="controls">
                <h3>🎮 操作说明</h3>
                <div class="controls-grid">
                    <div><span>←→</span> 移动</div>
                    <div><span>↓</span> 加速</div>
                    <div><span>↑</span> 旋转</div>
                    <div><span>空格</span> 落下</div>
                    <div><span>P</span> 暂停</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 输入名字对话框 -->
    <div id="nameInputModal" class="name-input-modal">
        <div class="name-input-box">
            <h3>🎉 恭喜上榜！</h3>
            <div class="final-score">得分: <span id="modalScore">0</span></div>
            <input type="text" id="playerNameInput" placeholder="输入你的名字" maxlength="10" autocomplete="off">
            <br>
            <button class="start-btn" onclick="game.saveScore()">保存记录</button>
        </div>
    </div>

    <script>
        // 音效系统类
        class SoundSystem {
            constructor() {
                this.enabled = true;
                this.volume = 0.5;
                this.audioContext = null;
                this.initAudioContext();
            }

            initAudioContext() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio API not supported');
                }
            }

            // 播放方块落地音效
            playDrop() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone(150, 0.05, 'square');
            }

            // 播放消除行音效
            playClear(lines) {
                if (!this.enabled || !this.audioContext) return;
                const baseFreq = 300 + (lines - 1) * 100;
                this.playTone(baseFreq, 0.15, 'sine');
                setTimeout(() => this.playTone(baseFreq * 1.5, 0.15, 'sine'), 100);
                if (lines >= 4) {
                    setTimeout(() => this.playTone(baseFreq * 2, 0.3, 'sine'), 200);
                }
            }

            // 播放游戏结束音效
            playGameOver() {
                if (!this.enabled || !this.audioContext) return;
                const notes = [300, 250, 200, 150];
                notes.forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.3, 'sawtooth'), i * 200);
                });
            }

            // 播放旋转音效
            playRotate() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone(400, 0.03, 'sine');
            }

            // 播放移动音效
            playMove() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone(200, 0.02, 'triangle');
            }

            // 播放硬降音效
            playHardDrop() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone(100, 0.1, 'square');
            }

            // 播放高分音效
            playHighScore() {
                if (!this.enabled || !this.audioContext) return;
                const notes = [440, 554, 659, 880];
                notes.forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.15, 'sine'), i * 100);
                });
            }

            // 播放暂停/恢复音效
            playPause() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone(350, 0.08, 'sine');
            }

            // 通用播放音调方法
            playTone(frequency, duration, type = 'sine') {
                if (!this.audioContext) return;
                
                // 恢复音频上下文（浏览器策略）
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.frequency.value = frequency;
                oscillator.type = type;
                gainNode.gain.value = this.volume;

                // 添加淡入淡出效果
                gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(this.volume, this.audioContext.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);

                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            }

            toggle() {
                this.enabled = !this.enabled;
                return this.enabled;
            }

            setVolume(vol) {
                this.volume = Math.max(0, Math.min(1, vol));
            }
        }

        // 本地排行榜管理类
        class Leaderboard {
            constructor() {
                this.storageKey = 'tetris_leaderboard';
                this.maxEntries = 5;
                this.scores = this.load();
            }

            load() {
                try {
                    const data = localStorage.getItem(this.storageKey);
                    return data ? JSON.parse(data) : [];
                } catch (e) {
                    return [];
                }
            }

            save() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.scores));
                } catch (e) {
                    console.warn('无法保存排行榜数据');
                }
            }

            isHighScore(score) {
                if (this.scores.length < this.maxEntries) return true;
                return score > this.scores[this.scores.length - 1].score;
            }

            addScore(name, score, level, lines) {
                const entry = {
                    name: name.trim() || '匿名玩家',
                    score: score,
                    level: level,
                    lines: lines,
                    date: new Date().toLocaleDateString('zh-CN')
                };

                this.scores.push(entry);
                this.scores.sort((a, b) => b.score - a.score);
                this.scores = this.scores.slice(0, this.maxEntries);
                this.save();
                return this.scores.indexOf(entry) + 1; // 返回排名
            }

            getAll() {
                return this.scores;
            }

            clear() {
                this.scores = [];
                localStorage.removeItem(this.storageKey);
            }
        }

        // 俄罗斯方块游戏类
        class Tetris {
            constructor() {
                this.canvas = document.getElementById('game');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next1');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                // 排行榜
                this.leaderboard = new Leaderboard();
                this.pendingScore = null; // 等待保存的分数
                
                // 音效系统
                this.sounds = new SoundSystem();
                
                // 游戏配置
                this.cols = 10;
                this.rows = 20;
                this.blockSize = 30;
                
                // 方块形状定义
                this.shapes = {
                    I: {
                        shape: [[1, 1, 1, 1]],
                        color: '#00f0f0'
                    },
                    O: {
                        shape: [[1, 1], [1, 1]],
                        color: '#f0f000'
                    },
                    T: {
                        shape: [[0, 1, 0], [1, 1, 1]],
                        color: '#a000f0'
                    },
                    S: {
                        shape: [[0, 1, 1], [1, 1, 0]],
                        color: '#00f000'
                    },
                    Z: {
                        shape: [[1, 1, 0], [0, 1, 1]],
                        color: '#f00000'
                    },
                    J: {
                        shape: [[1, 0, 0], [1, 1, 1]],
                        color: '#0000f0'
                    },
                    L: {
                        shape: [[0, 0, 1], [1, 1, 1]],
                        color: '#f0a000'
                    }
                };
                
                this.shapeNames = Object.keys(this.shapes);
                this.reset();
                this.draw();
                this.updateLeaderboardUI();
            }
            
            reset() {
                // 初始化游戏板
                this.board = Array(this.rows).fill(null).map(() => Array(this.cols).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameOver = false;
                this.paused = false;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;
                
                // 生成当前方块和下一个预览
                this.currentPiece = this.generatePiece();
                this.nextPiece = this.generatePiece();
                
                this.updateUI();
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('startBtn').textContent = '重新开始';
            }
            
            generatePiece() {
                const name = this.shapeNames[Math.floor(Math.random() * this.shapeNames.length)];
                const shapeData = this.shapes[name];
                return {
                    name: name,
                    shape: shapeData.shape,
                    color: shapeData.color,
                    x: Math.floor((this.cols - shapeData.shape[0].length) / 2),
                    y: 0
                };
            }
            
            start() {
                if (this.gameOver) {
                    this.reset();
                }
                this.paused = false;
                this.lastTime = performance.now();
                this.update();
            }
            
            restart() {
                this.reset();
                this.start();
            }
            
            update(time = performance.now()) {
                if (this.gameOver || this.paused) return;
                
                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                
                this.dropCounter += deltaTime;
                
                if (this.dropCounter > this.dropInterval) {
                    this.drop();
                }
                
                this.draw();
                requestAnimationFrame(this.update.bind(this));
            }
            
            drop() {
                this.currentPiece.y++;
                
                if (this.collision()) {
                    this.currentPiece.y--;
                    this.merge();
                    this.sounds.playDrop(); // 播放落地音效
                    this.clearLines();
                    
                    // 获取下一个方块
                    this.currentPiece = this.nextPiece;
                    this.nextPiece = this.generatePiece();
                    
                    if (this.collision()) {
                        this.endGame();
                        return;
                    }
                }
                
                this.dropCounter = 0;
            }
            
            hardDrop() {
                while (!this.collision()) {
                    this.currentPiece.y++;
                }
                this.currentPiece.y--;
                this.sounds.playHardDrop(); // 播放硬降音效
                this.drop();
            }
            
            collision() {
                const { shape, x, y } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            
                            if (newX < 0 || newX >= this.cols || newY >= this.rows) {
                                return true;
                            }
                            
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            merge() {
                const { shape, x, y, color } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const boardY = y + row;
                            const boardX = x + col;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = color;
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let row = this.rows - 1; row >= 0; row--) {
                    if (this.board[row].every(cell => cell !== 0)) {
                        this.board.splice(row, 1);
                        this.board.unshift(Array(this.cols).fill(0));
                        linesCleared++;
                        row++;
                    }
                }
                
                if (linesCleared > 0) {
                    const points = [0, 100, 300, 600, 1000];
                    this.score += points[linesCleared] * this.level;
                    this.lines += linesCleared;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.sounds.playClear(linesCleared); // 播放消除行音效
                    this.updateUI();
                }
            }
            
            rotate() {
                const { shape } = this.currentPiece;
                const rotated = shape[0].map((_, i) => shape.map(row => row[i]).reverse());
                const originalShape = this.currentPiece.shape;
                
                this.currentPiece.shape = rotated;
                
                if (this.collision()) {
                    // 尝试左右移动来适应旋转
                    this.currentPiece.x--;
                    if (this.collision()) {
                        this.currentPiece.x += 2;
                        if (this.collision()) {
                            this.currentPiece.x--;
                            this.currentPiece.shape = originalShape;
                            return; // 旋转失败，不播放音效
                        }
                    }
                }
                this.sounds.playRotate(); // 播放旋转音效
            }
            
            move(dir) {
                this.currentPiece.x += dir;
                if (this.collision()) {
                    this.currentPiece.x -= dir;
                } else {
                    this.sounds.playMove(); // 播放移动音效
                }
            }
            
            endGame() {
                this.gameOver = true;
                this.sounds.playGameOver(); // 播放游戏结束音效
                document.getElementById('finalScore').textContent = this.score;
                
                // 检查是否进入排行榜
                if (this.leaderboard.isHighScore(this.score)) {
                    this.pendingScore = {
                        score: this.score,
                        level: this.level,
                        lines: this.lines
                    };
                    document.getElementById('modalScore').textContent = this.score;
                    document.getElementById('playerNameInput').value = '';
                    document.getElementById('nameInputModal').classList.add('show');
                    setTimeout(() => document.getElementById('playerNameInput').focus(), 100);
                } else {
                    document.getElementById('gameOver').classList.add('show');
                }
            }
            
            saveScore() {
                const name = document.getElementById('playerNameInput').value;
                if (name.trim()) {
                    this.leaderboard.addScore(name, this.pendingScore.score, this.pendingScore.level, this.pendingScore.lines);
                    this.sounds.playHighScore(); // 播放高分音效
                    this.updateLeaderboardUI();
                }
                document.getElementById('nameInputModal').classList.remove('show');
                document.getElementById('gameOver').classList.add('show');
                this.pendingScore = null;
            }
            
            updateLeaderboardUI() {
                const list = document.getElementById('leaderboardList');
                const scores = this.leaderboard.getAll();
                
                if (scores.length === 0) {
                    list.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">暂无记录</div>';
                    return;
                }
                
                list.innerHTML = scores.map((entry, index) => `
                    <div class="leaderboard-item top-${index + 1}">
                        <span class="leaderboard-rank">${index + 1}</span>
                        <span class="leaderboard-name">${this.escapeHtml(entry.name)}</span>
                        <span class="leaderboard-score">${entry.score.toLocaleString()}</span>
                    </div>
                `).join('');
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            togglePause() {
                if (this.gameOver) return;
                this.paused = !this.paused;
                this.sounds.playPause(); // 播放暂停/恢复音效
                if (!this.paused) {
                    this.lastTime = performance.now();
                    this.update();
                }
                this.draw();
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格线
                this.ctx.strokeStyle = '#222';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= this.cols; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.blockSize, 0);
                    this.ctx.lineTo(i * this.blockSize, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= this.rows; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.blockSize);
                    this.ctx.lineTo(this.canvas.width, i * this.blockSize);
                    this.ctx.stroke();
                }
                
                // 绘制已固定的方块
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.board[row][col]) {
                            this.drawBlock(this.ctx, col, row, this.board[row][col]);
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    const { shape, x, y, color } = this.currentPiece;
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                this.drawBlock(this.ctx, x + col, y + row, color);
                            }
                        }
                    }
                    
                    // 绘制阴影（预览落点）
                    this.drawShadow();
                }
                
                // 绘制预览队列
                this.drawNextQueue();
                
                // 暂停提示
                if (this.paused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('暂停', this.canvas.width / 2, this.canvas.height / 2);
                }
            }
            
            drawShadow() {
                const { shape, x, y, color } = this.currentPiece;
                let shadowY = y;
                
                // 找到落点
                while (true) {
                    shadowY++;
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                const newX = x + col;
                                const newY = shadowY + row;
                                if (newX < 0 || newX >= this.cols || newY >= this.rows || 
                                    (newY >= 0 && this.board[newY][newX])) {
                                    shadowY--;
                                    // 绘制阴影
                                    for (let r = 0; r < shape.length; r++) {
                                        for (let c = 0; c < shape[r].length; c++) {
                                            if (shape[r][c]) {
                                                this.ctx.strokeStyle = color;
                                                this.ctx.lineWidth = 2;
                                                this.ctx.strokeRect(
                                                    (x + c) * this.blockSize + 5,
                                                    (shadowY + r) * this.blockSize + 5,
                                                    this.blockSize - 10,
                                                    this.blockSize - 10
                                                );
                                            }
                                        }
                                    }
                                    return;
                                }
                            }
                        }
                    }
                }
            }
            
            drawBlock(ctx, x, y, color) {
                const px = x * this.blockSize;
                const py = y * this.blockSize;
                
                // 主体
                ctx.fillStyle = color;
                ctx.fillRect(px + 1, py + 1, this.blockSize - 2, this.blockSize - 2);
                
                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(px + 1, py + 1, this.blockSize - 2, 4);
                ctx.fillRect(px + 1, py + 1, 4, this.blockSize - 2);
                
                // 阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(px + 1, py + this.blockSize - 5, this.blockSize - 2, 4);
                ctx.fillRect(px + this.blockSize - 5, py + 1, 4, this.blockSize - 2);
            }
            
            drawNextQueue() {
                const ctx = this.nextCtx;
                const canvas = this.nextCanvas;
                
                // 清空画布
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (!this.nextPiece) return;
                
                const { shape, color } = this.nextPiece;
                const blockSize = 8;
                const offsetX = (canvas.width - shape[0].length * blockSize) / 2;
                const offsetY = (canvas.height - shape.length * blockSize) / 2;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const px = offsetX + col * blockSize;
                            const py = offsetY + row * blockSize;
                            
                            // 主体
                            ctx.fillStyle = color;
                            ctx.fillRect(px + 1, py + 1, blockSize - 2, blockSize - 2);
                            
                            // 高光
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(px + 1, py + 1, blockSize - 2, 1);
                            ctx.fillRect(px + 1, py + 1, 1, blockSize - 2);
                            
                            // 阴影
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.fillRect(px + 1, py + blockSize - 2, blockSize - 2, 1);
                            ctx.fillRect(px + blockSize - 2, py + 1, 1, blockSize - 2);
                        }
                    }
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score.toLocaleString();
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            toggleSound() {
                const enabled = this.sounds.toggle();
                const btn = document.getElementById('soundToggle');
                if (enabled) {
                    btn.textContent = '🔊 开启';
                    btn.classList.remove('muted');
                } else {
                    btn.textContent = '🔇 关闭';
                    btn.classList.add('muted');
                }
            }

            setVolume(value) {
                this.sounds.setVolume(value / 100);
                document.getElementById('volumeValue').textContent = value + '%';
            }
        }
        
        // 初始化游戏
        const game = new Tetris();
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (game.gameOver) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    game.move(-1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    game.move(1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    game.drop();
                    game.dropCounter = 0;
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    game.rotate();
                    break;
                case ' ':
                    e.preventDefault();
                    game.hardDrop();
                    break;
                case 'p':
                case 'P':
                    game.togglePause();
                    break;
            }
            game.draw();
        });

        // 名字输入框回车提交
        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                game.saveScore();
            }
        });
    </script>
</body>
</html>
