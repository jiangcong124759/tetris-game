<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        canvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: #000;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 150px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .info-box h3 {
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .info-box .value {
            font-size: 1.8em;
            font-weight: bold;
        }
        .next-piece canvas {
            width: 100px;
            height: 100px;
        }
        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85em;
            line-height: 1.8;
        }
        .controls h3 {
            color: #ff00ff;
            margin-bottom: 10px;
        }
        .controls span {
            color: #00d4ff;
            font-weight: bold;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .start-btn {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #ff00ff;
            text-align: center;
            display: none;
        }
        .game-over h2 {
            color: #ff00ff;
            font-size: 2em;
            margin-bottom: 15px;
        }
        .game-over.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <h1>🎮 俄罗斯方块</h1>
            <div style="position: relative;">
                <canvas id="game" width="300" height="600"></canvas>
                <div id="gameOver" class="game-over">
                    <h2>游戏结束</h2>
                    <p>最终得分: <span id="finalScore">0</span></p>
                    <button class="start-btn" onclick="game.restart()">重新开始</button>
                </div>
            </div>
            <button id="startBtn" class="start-btn" onclick="game.start()">开始游戏</button>
        </div>
        <div class="right-panel">
            <div class="info-box">
                <h3>🏆 得分</h3>
                <div id="score" class="value">0</div>
            </div>
            <div class="info-box">
                <h3>🎯 等级</h3>
                <div id="level" class="value">1</div>
            </div>
            <div class="info-box">
                <h3>📊 消除行数</h3>
                <div id="lines" class="value">0</div>
            </div>
            <div class="info-box next-piece">
                <h3>🔮 下一个</h3>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
            <div class="controls">
                <h3>🎮 操作说明</h3>
                <div><span>←</span> 左移</div>
                <div><span>→</span> 右移</div>
                <div><span>↓</span> 加速下落</div>
                <div><span>↑</span> 旋转</div>
                <div><span>空格</span> 直接落下</div>
                <div><span>P</span> 暂停</div>
            </div>
        </div>
    </div>

    <script>
        // 俄罗斯方块游戏类
        class Tetris {
            constructor() {
                this.canvas = document.getElementById('game');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                // 游戏配置
                this.cols = 10;
                this.rows = 20;
                this.blockSize = 30;
                
                // 方块形状定义
                this.shapes = {
                    I: {
                        shape: [[1, 1, 1, 1]],
                        color: '#00f0f0'
                    },
                    O: {
                        shape: [[1, 1], [1, 1]],
                        color: '#f0f000'
                    },
                    T: {
                        shape: [[0, 1, 0], [1, 1, 1]],
                        color: '#a000f0'
                    },
                    S: {
                        shape: [[0, 1, 1], [1, 1, 0]],
                        color: '#00f000'
                    },
                    Z: {
                        shape: [[1, 1, 0], [0, 1, 1]],
                        color: '#f00000'
                    },
                    J: {
                        shape: [[1, 0, 0], [1, 1, 1]],
                        color: '#0000f0'
                    },
                    L: {
                        shape: [[0, 0, 1], [1, 1, 1]],
                        color: '#f0a000'
                    }
                };
                
                this.shapeNames = Object.keys(this.shapes);
                this.reset();
                this.draw();
            }
            
            reset() {
                // 初始化游戏板
                this.board = Array(this.rows).fill(null).map(() => Array(this.cols).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameOver = false;
                this.paused = false;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;
                
                // 生成当前和下一个方块
                this.currentPiece = this.generatePiece();
                this.nextPiece = this.generatePiece();
                
                this.updateUI();
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('startBtn').textContent = '重新开始';
            }
            
            generatePiece() {
                const name = this.shapeNames[Math.floor(Math.random() * this.shapeNames.length)];
                const shapeData = this.shapes[name];
                return {
                    name: name,
                    shape: shapeData.shape,
                    color: shapeData.color,
                    x: Math.floor((this.cols - shapeData.shape[0].length) / 2),
                    y: 0
                };
            }
            
            start() {
                if (this.gameOver) {
                    this.reset();
                }
                this.paused = false;
                this.lastTime = performance.now();
                this.update();
            }
            
            restart() {
                this.reset();
                this.start();
            }
            
            update(time = performance.now()) {
                if (this.gameOver || this.paused) return;
                
                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                
                this.dropCounter += deltaTime;
                
                if (this.dropCounter > this.dropInterval) {
                    this.drop();
                }
                
                this.draw();
                requestAnimationFrame(this.update.bind(this));
            }
            
            drop() {
                this.currentPiece.y++;
                
                if (this.collision()) {
                    this.currentPiece.y--;
                    this.merge();
                    this.clearLines();
                    this.currentPiece = this.nextPiece;
                    this.nextPiece = this.generatePiece();
                    
                    if (this.collision()) {
                        this.endGame();
                        return;
                    }
                }
                
                this.dropCounter = 0;
            }
            
            hardDrop() {
                while (!this.collision()) {
                    this.currentPiece.y++;
                }
                this.currentPiece.y--;
                this.drop();
            }
            
            collision() {
                const { shape, x, y } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            
                            if (newX < 0 || newX >= this.cols || newY >= this.rows) {
                                return true;
                            }
                            
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            merge() {
                const { shape, x, y, color } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const boardY = y + row;
                            const boardX = x + col;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = color;
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let row = this.rows - 1; row >= 0; row--) {
                    if (this.board[row].every(cell => cell !== 0)) {
                        this.board.splice(row, 1);
                        this.board.unshift(Array(this.cols).fill(0));
                        linesCleared++;
                        row++;
                    }
                }
                
                if (linesCleared > 0) {
                    const points = [0, 100, 300, 600, 1000];
                    this.score += points[linesCleared] * this.level;
                    this.lines += linesCleared;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateUI();
                }
            }
            
            rotate() {
                const { shape } = this.currentPiece;
                const rotated = shape[0].map((_, i) => shape.map(row => row[i]).reverse());
                const originalShape = this.currentPiece.shape;
                
                this.currentPiece.shape = rotated;
                
                if (this.collision()) {
                    // 尝试左右移动来适应旋转
                    this.currentPiece.x--;
                    if (this.collision()) {
                        this.currentPiece.x += 2;
                        if (this.collision()) {
                            this.currentPiece.x--;
                            this.currentPiece.shape = originalShape;
                        }
                    }
                }
            }
            
            move(dir) {
                this.currentPiece.x += dir;
                if (this.collision()) {
                    this.currentPiece.x -= dir;
                }
            }
            
            endGame() {
                this.gameOver = true;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').classList.add('show');
            }
            
            togglePause() {
                if (this.gameOver) return;
                this.paused = !this.paused;
                if (!this.paused) {
                    this.lastTime = performance.now();
                    this.update();
                }
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格线
                this.ctx.strokeStyle = '#222';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= this.cols; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.blockSize, 0);
                    this.ctx.lineTo(i * this.blockSize, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= this.rows; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.blockSize);
                    this.ctx.lineTo(this.canvas.width, i * this.blockSize);
                    this.ctx.stroke();
                }
                
                // 绘制已固定的方块
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.board[row][col]) {
                            this.drawBlock(this.ctx, col, row, this.board[row][col]);
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    const { shape, x, y, color } = this.currentPiece;
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                this.drawBlock(this.ctx, x + col, y + row, color);
                            }
                        }
                    }
                    
                    // 绘制阴影（预览落点）
                    this.drawShadow();
                }
                
                // 绘制下一个方块
                this.drawNext();
                
                // 暂停提示
                if (this.paused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('暂停', this.canvas.width / 2, this.canvas.height / 2);
                }
            }
            
            drawShadow() {
                const { shape, x, y, color } = this.currentPiece;
                let shadowY = y;
                
                while (true) {
                    shadowY++;
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                const newX = x + col;
                                const newY = shadowY + row;
                                if (newX < 0 || newX >= this.cols || newY >= this.rows || 
                                    (newY >= 0 && this.board[newY][newX])) {
                                    shadowY--;
                                    // 绘制阴影
                                    for (let r = 0; r < shape.length; r++) {
                                        for (let c = 0; c < shape[r].length; c++) {
                                            if (shape[r][c]) {
                                                this.ctx.strokeStyle = color;
                                                this.ctx.lineWidth = 2;
                                                this.ctx.strokeRect(
                                                    (x + c) * this.blockSize + 5,
                                                    (shadowY + r) * this.blockSize + 5,
                                                    this.blockSize - 10,
                                                    this.blockSize - 10
                                                );
                                            }
                                        }
                                    }
                                    return;
                                }
                            }
                        }
                    }
                }
            }
            
            drawBlock(ctx, x, y, color) {
                const px = x * this.blockSize;
                const py = y * this.blockSize;
                
                // 主体
                ctx.fillStyle = color;
                ctx.fillRect(px + 1, py + 1, this.blockSize - 2, this.blockSize - 2);
                
                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(px + 1, py + 1, this.blockSize - 2, 4);
                ctx.fillRect(px + 1, py + 1, 4, this.blockSize - 2);
                
                // 阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(px + 1, py + this.blockSize - 5, this.blockSize - 2, 4);
                ctx.fillRect(px + this.blockSize - 5, py + 1, 4, this.blockSize - 2);
            }
            
            drawNext() {
                this.nextCtx.fillStyle = '#000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (!this.nextPiece) return;
                
                const { shape, color } = this.nextPiece;
                const blockSize = 20;
                const offsetX = (this.nextCanvas.width - shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - shape.length * blockSize) / 2;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const px = offsetX + col * blockSize;
                            const py = offsetY + row * blockSize;
                            
                            this.nextCtx.fillStyle = color;
                            this.nextCtx.fillRect(px + 1, py + 1, blockSize - 2, blockSize - 2);
                            
                            this.nextCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            this.nextCtx.fillRect(px + 1, py + 1, blockSize - 2, 3);
                            this.nextCtx.fillRect(px + 1, py + 1, 3, blockSize - 2);
                            
                            this.nextCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                            this.nextCtx.fillRect(px + 1, py + blockSize - 4, blockSize - 2, 3);
                            this.nextCtx.fillRect(px + blockSize - 4, py + 1, 3, blockSize - 2);
                        }
                    }
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }
        
        // 初始化游戏
        const game = new Tetris();
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (game.gameOver) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    game.move(-1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    game.move(1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    game.drop();
                    game.dropCounter = 0;
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    game.rotate();
                    break;
                case ' ':
                    e.preventDefault();
                    game.hardDrop();
                    break;
                case 'p':
                case 'P':
                    game.togglePause();
                    break;
            }
            game.draw();
        });
    </script>
</body>
</html>
